name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libnotify-dev \
            freeglut3-dev \
            libsdl2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libcanberra-gtk-module \
            libsdl2-mixer-2.0-0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        shell: bash

      - name: Install Dependencies
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            uv sync --all-extras --find-links https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04
          else
            uv sync --all-extras
          fi
        shell: bash

      - name: Install Nuitka
        run: uv run pip install nuitka

      - name: Build with Nuitka
        run: uv run python scripts/build.py

      - name: Package Windows Installer (NSIS)
        if: matrix.os == 'windows-latest'
        run: |
          makensis scripts/installer.nsi
          mv WikiArchitect-Installer-*.exe WikiArchitect-Windows.exe

      - name: Package macOS (DMG)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dmg_root
          cp -r dist/main.app dmg_root/
          hdiutil create -volname "WikiArchitect" -srcfolder dmg_root -ov -format UDZO WikiArchitect-macOS.dmg

      - name: Package Ubuntu (Zip)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r ../WikiArchitect-Linux.zip main.dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WikiArchitect-Windows.exe
            WikiArchitect-macOS.dmg
            WikiArchitect-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
